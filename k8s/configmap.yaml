# NOTE: This ConfigMap holds non-sensitive environment variables only.
# Secrets (DATABASE_URL, SECRET_KEY, OPENAI_API_KEY, KAFKA_BOOTSTRAP_SERVERS)
# MUST be stored in a Kubernetes Secret named 'supportpilot-secrets'.
# Never put plaintext credentials in this file.

apiVersion: v1
kind: ConfigMap
metadata:
  name: supportpilot-config
  namespace: supportpilot
data:
  ENVIRONMENT: "production"
  OPENAI_MODEL: "gpt-4o-mini"
  USE_KAFKA: "true"
  # NOTE: KAFKA_BOOTSTRAP_SERVERS here is the in-cluster service address.
  # Override via supportpilot-secrets if your Kafka is external/managed.
  KAFKA_BOOTSTRAP_SERVERS: "kafka-service:9092"
  APP_VERSION: "1.0.0"
  # NOTE: Replace with your actual frontend origin before deploying.
  CORS_ORIGINS: "https://your-frontend.vercel.app"
